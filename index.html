<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>




  <body>
    <header style="
    background: linear-gradient(135deg, #d1205b 0%, #732db9 100%);
    background-image:url('https://i.ibb.co/JjHv8hpT/Screenshot-20260414-150801.jpg');
   
    color: rgb(44, 236, 124);
    padding: 20px;
    text-align: center;
    position: fixed;
    top: 0;
    height: 150px;
    width: 100%;
    z-index: 1000;
  ">
      <div>

        <h1 style="margin: 0; font-size: 2rem;">HP HypePack</h1>

        <p style="margin: 5px 0 10px; font-size: 1.1rem;">
          Your one-stop shop for quality products
        </p>


        <button class="cartButton" style="
    background: rgba(255, 255, 255, 0.2);
    color: rgb(16, 218, 77);
    border: 1px solid white;
    padding: 8px 12px;
    font-size: 1.2rem;
    cursor: pointer;;
    border-radius: 6px;
    ">
          🛒</button>
      </div>

      <!-- </div> -->
      <!-- <div class="top-right-buttons">
        <a class="top-btn" href="/login.html" style="font-size: 0.8rem; padding: 5px 10px; border-radius: 6px">
          Admin
        </a>
      </div> -->

    </header>
    <!-- Popup Modal -->
    <div id="popup" class="popup">
      <div class="popup-content">
        <i><i></i>Let get you styled for your <i>FYB</i><br />Get face paint for your color day</i></p>
        <button id="close-btn">Close</button>
      </div>
    </div>


    <main class="main-content">


      <div id="loader" class="loader"></div>
      <section id="productList" class="product-list">
        <!-- Products will be rendered here -->
      </section>
    </main>

    <section id="cart" class="cart">
      <h2>Your Cart</h2>
      <button id="closeCartButton">Back</button>
      <div id="cartItems" class="cart-items">
        <!-- Cart items will be displayed here -->
      </div>
      <div id="cartTotal" class="cart-total">
        <!-- Total price will be displayed here -->
      </div>
      <button id="checkoutButton">Checkout</button>
    </section>



    <button class="cartButton" id="butt">🛒</button>

    <script type="module" src="config.js"></script>
    <script type="module" src="script-2.js"></script>
  </body>

</html>
